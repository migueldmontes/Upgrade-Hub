<!--
Crea un título **h1** y tres títulos **h2** cada uno acompañado de un texto **p.** Dale color a los elementos mediante los selectores que creas convenientes, pero ten en cuenta que:

* El h1 será de color naranja
* El primer h2 será de color rojo
* El segundo h2 será de color verde
* El tercer h2 será de color azul
* El p que acompaña al primer h2 será azul
* El p que acompaña al segundo h2 será rojo
* El p que acompaña al tercer h2 será verde
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Ejercico Selectores CSS</title>
  </head>
<body>
  <h1>Titulo H1</h1>
<h2 class="title-red">Primer Titulo H2</h2>
  <p class="parrafo-blue">Primer Parrafo P</p>
    <h2 class="title-green">Segundo titulo H2</h2>
  <p class="parrafo-red">Segundo Parrafo P</p>
    <h2 class="title-blue">Tercer Titulo H3</h2>
  <p class="parrafo-green">Tercer Parrafo P</p>
  </body>
</html>
